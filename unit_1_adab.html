<!DOCTYPE html>
<html lang="ms">
<head>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #EEF2FF; } /* Indigo-50 Background */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .unit-card:hover { transform: translateY(-3px); box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.1); }
    </style>

<body class="min-h-screen flex flex-col text-slate-700 selection:bg-indigo-200">

    <!-- Header -->
        <header class="w-full bg-white/90 backdrop-blur-sm sticky top-0 z-50 border-b-2 border-slate-100 shadow-sm">
        <div class="max-w-6xl mx-auto px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            
            <a href="index.html" class="flex items-center gap-4 hover:opacity-90 transition">
                <div class="w-12 h-12 bg-indigo-600 rounded-xl flex items-center justify-center shadow-md">
                    <i class="ph-bold ph-book-open text-white text-2xl"></i>
                </div>
                <div>

            </a>
            <div class="hidden sm:flex items-center gap-2 bg-indigo-50 px-4 py-2 rounded-full border border-indigo-100">

    <main class="flex-grow max-w-5xl mx-auto px-6 py-10 w-full fade-in">
        
        <!-- Butang Kembali ke Utama -->
        <button onclick="window.location.href='index.html'" class="mb-8 flex items-center gap-2 text-slate-500 hover:text-indigo-600 font-bold transition-colors group">
            <div class="bg-white p-2 rounded-full shadow-sm border border-slate-200 group-hover:border-indigo-200 group-hover:bg-indigo-50 transition-all">
                <i class="ph-bold ph-house"></i>
            </div>
            Kembali ke Menu Utama

    </main>

    <footer class="text-center py-8 text-slate-400 text-sm font-semibold border-t border-indigo-100 bg-white/50 mt-auto">
